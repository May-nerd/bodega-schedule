name: Refresh Bodega schedule

on:
  schedule:
    # Near-live during tournament window (UTC). GitHub cron is best-effort.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-bodega-schedule
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Bodega schedule from PicklePodium
        run: python3 scripts/fetch_bodega_schedule.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- schedule/bodega-schedule.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule/bodega-schedule.json
          git commit -m "Refresh Bodega Baseline Cup schedule from PicklePodium."
          git push
